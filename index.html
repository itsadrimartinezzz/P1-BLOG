
<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <title>Blog</title>
</head>
<body>
    <!--Navbar-->
    <nav class="navbar">
        <div class="logo">BlogLab</div>

        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="pages/create.html">Crear</a>
            <a href="pages/about.html">About</a>
        </div>  
    </nav>

    <!--Filtros -->
    <div id="filters">
  <input type="text" id="search-input" placeholder="Buscar...">
  <input type="number" id="user-filter" placeholder="Usuario ID" min="1">
  <input type="text" id="tag-filter" placeholder="Tag">
  <button id="clear-filters">Limpiar</button>
</div>

<div id="popular-tags">
  <span class="tag-pill active" data-tag="">Todos</span>
  <span class="tag-pill" data-tag="history">History</span>
  <span class="tag-pill" data-tag="crime">Crime</span>
  <span class="tag-pill" data-tag="mystery">Mystery</span>
  <span class="tag-pill" data-tag="love">Love</span>
</div>
    <!-- Contenedor de posts -->
     <div id ="posts-container"></div>

     <!--paginacion-->
     <div id="pagination">
        <button id="prev-btn">Anterior</button>
        <span id="page-number">1</span>
        <button id="next-btn">Siguiente</button>
     </div>

     <!--Script -->
     <script type="module" src="js/app.js"></script>

    
</body>
</html>
