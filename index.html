<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <title>BlogLab</title>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <span class="brand-title">BlogLab</span>
        <span class="brand-subtitle">Adriana & Mishell</span>
      </div>
    </div>

    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="pages/create.html">Create</a>
      <a href="pages/categories.html">Categories</a>
    </div>
  </nav>

  <main class="page-shell">
    <section class="home-intro">
      <h1 class="home-intro__title">Explore your creativity. Keep your mind active.</h1>
      <p class="home-intro__text">Find posts, filter them and create your own content.</p>
    </section>

    <section class="content-panel">
      <div id="feedback-message" class="feedback-message hidden"></div>

      <div id="filters" class="filters-bar">
        <input type="text" id="search-input" placeholder="Buscar por título o contenido..." />
        <input type="number" id="user-filter" placeholder="Autor ID" min="1" />
        <input type="text" id="tag-filter" placeholder="Buscar por tag..." />
        <button id="clear-filters" type="button">Limpiar</button>
      </div>

      <div id="popular-tags" class="popular-tags">
        <button class="tag-pill active" data-tag="" type="button">Todos</button>
        <button class="tag-pill" data-tag="history" type="button">History</button>
        <button class="tag-pill" data-tag="crime" type="button">Crime</button>
        <button class="tag-pill" data-tag="mystery" type="button">Mystery</button>
        <button class="tag-pill" data-tag="love" type="button">Love</button>
      </div>

      <div id="status-message" class="status-message hidden"></div>

      <section class="posts-section">
        <div id="posts-container" class="posts-grid"></div>
      </section>

      <div id="pagination" class="pagination">
        <button id="prev-btn" type="button">Anterior</button>
        <span id="page-number">1</span>
        <button id="next-btn" type="button">Siguiente</button>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
