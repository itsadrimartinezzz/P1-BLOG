<!DOCTYPE html>
<html lang="es">
    <main class="page-shell">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <title>BlogLab</title>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <span class="brand-title">BlogLab</span>
        <span class="brand-subtitle">Adriana & Mishell </span>
      </div>
    </div>

    <div class="nav-links">
      <a href="index.html" class="active">Inicio</a>
      <a href="pages/create.html">Crear</a>
      <a href="pages/about.html">Explorar</a>
    </div>
  </nav>


   <section class="home-intro">
     <h1 class="home-intro__title">Explore your creativity. Keep your mind active.</h1>
   </section>

  <main class="page-shell">
    <section class="content-panel">
      <div id="filters">
        <input type="text" id="search-input" placeholder="Buscar publicaciones..." />
        <input type="number" id="user-filter" placeholder="Autor ID" min="1" />
        <input type="text" id="tag-filter" placeholder="Tag" />
        <button id="clear-filters">Limpiar</button>
      </div>

      

      <div id="popular-tags">
        <span class="tag-pill active" data-tag="">Todos</span>
        <span class="tag-pill" data-tag="history">History</span>
        <span class="tag-pill" data-tag="crime">Crime</span>
        <span class="tag-pill" data-tag="mystery">Mystery</span>
        <span class="tag-pill" data-tag="love">Love</span>
      </div>

      <div id="posts-container"></div>

      <div id="pagination">
        <button id="prev-btn">Anterior</button>
        <span id="page-number">1</span>
        <button id="next-btn">Siguiente</button>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
